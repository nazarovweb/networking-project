# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Wholesale Cloud Platform
# Demonstrates B.P3 / B.P4: automated remote deployment via SSH.
#
# Stages:
#   1. test    — TypeScript check on every push / PR
#   2. build   — Docker images built and tested locally
#   3. deploy  — SSH into EC2, pull latest code, restart containers
#   4. verify  — HTTP health check confirms the live app is responding
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Stage 1: Test ────────────────────────────────────────────────────────
  test:
    name: Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Client/package-lock.json
            Server/package-lock.json

      - name: Install frontend deps
        working-directory: ./Client
        run: npm ci

      - name: Install backend deps
        working-directory: ./Server
        run: npm ci

      - name: TypeScript check — frontend
        working-directory: ./Client
        run: npx tsc --noEmit

      - name: TypeScript check — backend
        working-directory: ./Server
        run: npx tsc --noEmit

      - name: Unit tests — frontend (Redux slices & components)
        working-directory: ./Client
        run: npm test

      - name: Unit tests — backend (API routes with mocked DB)
        working-directory: ./Server
        env:
          JWT_ENCRYPTION_KEY: ci-jwt-secret-key-for-testing-only
          API_SECRET: ci-api-secret
          FRONTEND_SERVER_ORIGIN: http://localhost:3000
        run: npm test

  # ─── Stage 2: Build (on main branch only) ─────────────────────────────────
  build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t wholesale-frontend:test ./Client

      - name: Build backend image
        run: docker build -t wholesale-backend:test ./Server

      - name: Build nginx image
        run: docker build -t wholesale-nginx:test ./nginx

  # ─── Stage 3: Deploy via SSH ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ubuntu
          key:         ${{ secrets.EC2_SSH_KEY }}
          timeout:     300s
          script: |
            set -euo pipefail
            echo "=== Deploying wholesale platform ==="

            cd /home/ubuntu/app

            echo "[1/4] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "[2/4] Rebuilding and restarting containers..."
            docker compose build --no-cache
            docker compose up -d

            echo "[3/4] Removing unused images..."
            docker image prune -f

            echo "[4/4] Container status:"
            docker compose ps

  # ─── Stage 4: Health Check ────────────────────────────────────────────────
  verify:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for app to start
        run: sleep 30

      - name: Health check — Load Balancer
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 "https://${{ secrets.DOMAIN }}/health")
          echo "LB health: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Health check — Frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 "https://${{ secrets.DOMAIN }}/")
          echo "Frontend: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Health check — Backend API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 "https://${{ secrets.DOMAIN }}/api/")
          echo "Backend API: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Deployment summary
        run: |
          echo "✓ Deployment of commit ${{ github.sha }} succeeded"
          echo "  App URL: https://${{ secrets.DOMAIN }}"
          echo "  Time: $(date -u)"
