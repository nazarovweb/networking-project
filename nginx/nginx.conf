# ─────────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy & Load Balancer
#
# Dev mode  (docker-compose.yml):       1 frontend + 1 backend replica
# Prod mode (docker-compose.prod.yml):  N replicas; Docker's internal DNS
#                                       resolves "frontend" / "backend" to
#                                       all running containers automatically.
#
# Demonstrates A.P2: how client requests traverse the network tiers.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time '
                    'urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip         on;
    gzip_types   text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Security headers applied to every response
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ─── Upstream groups ─────────────────────────────────────────────────────
    # Docker Compose internal DNS resolves service names to all replica IPs.
    # "least_conn" distributes to the replica with fewest active connections.

    upstream frontend_cluster {
        least_conn;
        server frontend:3000;
        keepalive 16;
    }

    upstream backend_cluster {
        least_conn;
        server backend:3500;
        keepalive 16;
    }

    # ─── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

    # ─── Server ───────────────────────────────────────────────────────────────
    # HTTPS is handled by Cloudflare (Flexible SSL); nginx listens on HTTP only.
    server {
        listen 80;
        server_name nazarov.app www.nazarov.app _;

        # /api/* → Express backend
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Retry on upstream failure (enables zero-downtime rolling deploys)
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # /* → Next.js frontend
        location / {
            limit_req zone=general burst=100 nodelay;

            proxy_pass         http://frontend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # Load balancer self health-check (used by monitoring stack)
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-lb"}';
            add_header Content-Type application/json;
        }
    }
}
